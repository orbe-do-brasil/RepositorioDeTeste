<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Exercicio 2</title>
    <style>
        body{
            background: rgb(40, 149, 250);
            font: normal 12pt Arial;
        }

        header{
            color: white;
            text-align: center;
        }

        section{
            background: white;
            border-radius: 10px;
            padding: 20px;
            width: 500px;
            margin: auto;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.397);
        }

        footer{
            color: white;
            text-align: center;
            font-style: italic;
        }

        #resultxt{
            text-align: center;
        }

        #foto{
            padding-top: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Verificador De Idade</h1>
    </header>
    <section>
        <div>
            <p>Ano De Nascimento: 
                <input type="number" name="txtano" id="txtano" min="0">
            </p>
            <p> Sexo:
                <input type="radio" name="radsexo" id="masc" checked>
                <label for="masc">Masculino</label>
                <input type="radio" name="radsexo" id="fem">
                <label for="fem">Feminino</label>
            </p>
            <p>
                <input type="button" value="Validar" onclick="Validar()">
            </p>
        </div>
        <div id="resultxt">
            Preencha os dados acima para ver o resultado!
        </div>
    </section>
    <footer>
        <p>&copy; Rodapé</p>
    </footer>
    <script>
        function Validar(){
            var data = new Date()
            var ano = data.getFullYear()
            var formAno = document.getElementById('txtano')
            var resultado = document.getElementById('resultxt')

            if (formAno.value.length == 0 || formAno.value > ano){
                window.alert('[ERRO] Verifique os dados e tente novamente!')
            } else{
                var formSexo = document.getElementsByName('radsexo')
                var idade = ano - Number(formAno.value)
                var genero = ''
                var img = document.createElement('img')
                img.setAttribute('id', 'foto')

                if (formSexo[0].checked){
                    genero = 'Homem'
                    if (idade >= 0 && idade < 10){
                        // Criança
                        img.setAttribute('src', '../assets/criancahomem.jpg')
                    } else if (idade < 22){
                        // Jovem
                        img.setAttribute('src', '../assets/jovemhomem.jpg')
                    } else if (idade < 50){
                        // Adulto
                        img.setAttribute('src', '../assets/adultohomem.jpg')
                    } else {
                        // Idoso
                        img.setAttribute('src', '../assets/idosohomem.jpg')
                    }
                } else if (formSexo[1].checked){
                    genero = 'Mulher'
                    if (idade >= 0 && idade < 10){
                        // Criança
                        img.setAttribute('src', '../assets/criancamulher.jpg')
                    } else if (idade < 22){
                        // Jovem
                        img.setAttribute('src', '../assets/jovemmulher.jpg')
                    } else if (idade < 50){
                        // Adulto
                        img.setAttribute('src', '../assets/adultomulher.jpg')
                    } else {
                        // Idoso
                        img.setAttribute('src', '../assets/idosomulher.jpg')
                    }
                }
                resultado.innerHTML = `Detectamos ${genero} com ${idade} anos.`
                resultado.appendChild(img)
            }
        }
    </script>
</body>
</html>
