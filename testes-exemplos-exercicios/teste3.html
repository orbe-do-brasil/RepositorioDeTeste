<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Teste 3</title>
</head>
<body>
    <h1>Sistema De Multas</h1>
    Velocidade do carro: <input type="number" name="text" id="text"> km/h.
    <input type="button" value="verificar" onclick="calcular()">
    <div id="resultadotxt">

    </div>
    
    <script>
        function calcular() {
        var velocidadetxt = window.document.getElementById("text")
        var resultado = window.document.getElementById("resultadotxt")
        var velocidade = Number(velocidadetxt.value)
        resultado.innerHTML = `<p>Sua velocidade é de <strong>${velocidade}km/h</strong>.</p>`

        if(velocidade > 60){
            resultado.innerHTML += `<p>Você está <trong>multado<?strong> por excesso de velocidade!</p>`
        }
        resultado.innerHTML += `<p>Dirija sempre com cinto de segurança!</p>`
        }
    </script>
</body>
</html>
